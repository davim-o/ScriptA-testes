<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScriptA</title>
    <link rel="stylesheet" href="scripta_cad.css">
</head>
<body>

    <header>
        <img src="imgs/logo.png" alt="">
        <h1>Participe da torcida</h1>
    </header>

    <main>

        <section class="imagens">
            <img src="imgs/tigre.png" alt="Tigre">
            <img src="imgs/cobra.png" alt="Cobra">
            <img src="imgs/dragao.png" alt="Dragão">
            <img src="imgs/cavalo.png" alt="Cavalo">
        </section>

        <form action="">
            <section class="formula">

                <div class="mat">
                    <p>Matrícula</p>
                    <label for="matricula"></label>
                    <input type="text" id="matricula" placeholder="Digite sua matrícula">
                </div>

                <div class="senha">
                    <p>Senha</p>
                    <label for="password"></label>
                    <input type="password" id="password" placeholder="Digite sua senha">
                 
                </div>
            

                <div class="dirt">
                    <p>Diretoria</p>
                    <input type="checkbox" id="diaren" name="diretoria" value="diaren">
                    <label for="diaren">Diaren</label><br>

                    <input type="checkbox" id="diatinf" name="diretoria" value="diatinf">
                    <label for="diaren">Diatinf</label><br>

                    <input type="checkbox" id="diacon" name="diretoria" value="diacon">
                    <label for="diaren">Diacon</label><br>

                    <input type="checkbox" id="diacin" name="diretoria" value="diacin">
                    <label for="diaren">Diacin</label><br>


                 
                </div>

                <div class="area">
                    <p>Áreas</p>
                    <label for="password"></label>
                    <input type="password" id="password" placeholder="Digite sua senha">
                 
                </div>

                <div class="butao">
                    <button type="submit">Entrar</button>
                </div>

            </section>
        </form>

    </main>

    <footer>
        <p>© 2026 ScriptA. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
